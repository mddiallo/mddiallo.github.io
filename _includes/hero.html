<section id="about" class="hero">
  <div class="hero-inner">
    <img class="avatar" src="{{ '/assets/img/avatar.jpg' | relative_url }}" alt="{{ site.author }}">
    <div class="hero-text">
      <h1>Hi, I'm {{ site.author }}.</h1>
      <p class="tagline">{{ site.tagline }}</p>
      <p class="bio">
        I build reliable, well-crafted software — from APIs and data pipelines
        to clean, accessible web interfaces. Always learning, always shipping.
      </p>
      <div class="cta">
        <a class="btn primary" href="#projects">View my work</a>
        <a class="btn ghost" href="#contact">Get in touch</a>
      </div>
    </div>
  </div>
</section>
