<section id="skills" class="section">
  <div class="container">
    <h2>Skills</h2>
    <div class="skills-grid">
      {%- for group in site.data.skills -%}
        <div class="skill-group">
          <h3>{{ group.category }}</h3>
          <ul class="chips">
            {%- for item in group.items -%}
              <li class="chip">{{ item }}</li>
            {%- endfor -%}
          </ul>
        </div>
      {%- endfor -%}
    </div>
  </div>
</section>
