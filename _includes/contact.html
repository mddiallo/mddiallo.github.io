<section id="contact" class="section">
  <div class="container narrow">
    <h2>Get in touch</h2>
    <p>
      Interested in working together, or just want to say hi?
      I'd love to hear from you.
    </p>
    <div class="contact-links">
      <a class="btn primary" href="mailto:{{ site.email }}">Email me</a>
      {%- if site.github_username -%}
        <a class="icon-link" href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener" aria-label="GitHub">
          <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true"><path fill="currentColor" d="M12 .5C5.73.5.94 5.29.94 11.56c0 4.86 3.15 8.99 7.52 10.45.55.1.75-.24.75-.53v-1.86c-3.06.66-3.71-1.48-3.71-1.48-.5-1.27-1.22-1.61-1.22-1.61-1-.68.08-.66.08-.66 1.1.08 1.68 1.13 1.68 1.13.98 1.68 2.58 1.2 3.21.92.1-.71.38-1.2.69-1.48-2.44-.28-5.01-1.22-5.01-5.43 0-1.2.43-2.18 1.13-2.95-.11-.28-.49-1.4.11-2.92 0 0 .92-.3 3.02 1.13a10.5 10.5 0 0 1 5.5 0c2.1-1.43 3.02-1.13 3.02-1.13.6 1.52.22 2.64.11 2.92.7.77 1.13 1.75 1.13 2.95 0 4.22-2.58 5.15-5.03 5.42.39.34.74 1 .74 2.02v3c0 .29.2.64.76.53 4.36-1.46 7.51-5.59 7.51-10.45C23.06 5.29 18.27.5 12 .5z"/></svg>
        </a>
      {%- endif -%}
      {%- if site.linkedin_username -%}
        <a class="icon-link" href="https://www.linkedin.com/in/{{ site.linkedin_username }}" target="_blank" rel="noopener" aria-label="LinkedIn">
          <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true"><path fill="currentColor" d="M20.45 20.45h-3.55v-5.57c0-1.33-.03-3.04-1.85-3.04-1.85 0-2.13 1.45-2.13 2.94v5.67H9.36V9h3.41v1.56h.05c.47-.9 1.63-1.85 3.36-1.85 3.6 0 4.27 2.37 4.27 5.45v6.29zM5.34 7.43a2.06 2.06 0 1 1 0-4.12 2.06 2.06 0 0 1 0 4.12zM7.12 20.45H3.56V9h3.56v11.45z"/></svg>
        </a>
      {%- endif -%}
    </div>
  </div>
</section>
